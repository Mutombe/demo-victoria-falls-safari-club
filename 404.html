<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victoria Falls Safari Club</title>
    <script>
      // SPA refresh shim: stash the deep route so main.jsx can rehydrate after
      // the static host (GitHub Pages, Render preview) hands us /404.html.
      (function () {
        try {
          var path = window.location.pathname + window.location.search + window.location.hash;
          sessionStorage.setItem('vfsc:spa-redirect', path);
          window.location.replace('/');
        } catch (e) {
          window.location.replace('/');
        }
      })();
    </script>
  </head>
  <body></body>
</html>
